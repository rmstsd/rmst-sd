<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>sq</title>

    <style>
      body {
        user-select: none;
      }
      .rect {
        position: absolute;
        width: 200px;
        height: 200px;
        background-color: pink;
        left: 100px;
        top: 100px;
      }
      .cp {
        position: absolute;
        width: 10px;
        height: 10px;
        background-color: rgba(255, 0, 0, 0.7);
        border-radius: 100px;
      }
    </style>
  </head>

  <body>
    <div class="rect">
      <div class="rotateCtrl" style="width: 30px; height: 30px; background-color: antiquewhite"></div>
    </div>

    <div class="cp leftTop">1</div>
    <div class="cp rightTop">2</div>
    <div class="cp rightBottom">3</div>
    <div class="cp leftBottom">4</div>

    <script>
      let selected = document.querySelector('.rect')
      const rotateCtrl = document.querySelector('.rotateCtrl')

      const leftTop = document.querySelector('.leftTop')
      const rightTop = document.querySelector('.rightTop')
      const rightBottom = document.querySelector('.rightBottom')
      const leftBottom = document.querySelector('.leftBottom')

      const cpHalfSize = 5
      const oriRect = selected.getBoundingClientRect()
      let rotateCenter = { x: 0, y: 0 }

      updateRotateCenter()
      function updateRotateCenter() {
        const rect = selected.getBoundingClientRect()
        rotateCenter = { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 }
      }

      setCpCoord()
      function setCpCoord() {
        leftTop.style.left = oriRect.left - cpHalfSize + 'px'
        leftTop.style.top = oriRect.top - cpHalfSize + 'px'

        rightTop.style.left = oriRect.left + oriRect.width - cpHalfSize + 'px'
        rightTop.style.top = oriRect.top - cpHalfSize + 'px'

        rightBottom.style.left = oriRect.left + oriRect.width - cpHalfSize + 'px'
        rightBottom.style.top = oriRect.top + oriRect.height - cpHalfSize + 'px'

        leftBottom.style.left = oriRect.left - cpHalfSize + 'px'
        leftBottom.style.top = oriRect.top + oriRect.height - cpHalfSize + 'px'
      }

      let downCoord = { x: 0, y: 0 }
      let isDown = false
      const viewCoord = { x: 0, y: 0 }
      const curr = { x: 0, y: 0 }
      selected.addEventListener('pointerdown', evt => {
        isDown = true
        downCoord.x = evt.clientX
        downCoord.y = evt.clientY
      })
      document.addEventListener('pointerup', evt => {
        isDown = false
        Object.assign(viewCoord, curr)
      })
      document.addEventListener('pointermove', evt => {
        if (isDown) {
          const endCoord = { x: }
          curr.x = viewCoord.x + (evt.clientX - downCoord.x)
          curr.y = viewCoord.y + (evt.clientY - downCoord.y)

          selected.style.translate = `${curr.x}px ${curr.y}px`
          setCpCoord()
        }
      })

      let poDown = false
      let start = 0
      let viewRotate = 0
      let currRotate = 0
      {
        rotateCtrl.addEventListener('pointerdown', evt => {
          evt.stopPropagation()
          updateRotateCenter()
          poDown = true
          start = Math.atan2(evt.clientY - rotateCenter.y, evt.clientX - rotateCenter.x)
        })
        document.addEventListener('pointermove', evt => {
          if (!poDown) {
            return
          }
          const end = Math.atan2(evt.clientY - rotateCenter.y, evt.clientX - rotateCenter.x)
          const dis = end - start
          currRotate = viewRotate + dis
          selected.style.rotate = currRotate + 'rad'
        })
        document.addEventListener('pointerup', evt => {
          poDown = false
          viewRotate = currRotate
        })
      }

      function d2j(radians) {
        return radians * (180 / Math.PI)
      }
      //
    </script>
  </body>
</html>
