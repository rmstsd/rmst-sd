<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>z-retry</title>

    <style></style>
  </head>

  <body>
    <canvas width="800" height="600" style="border: 1px solid red"></canvas>

    <script>
      const canvas = document.querySelector('canvas')
      const ctx = canvas.getContext('2d')

      const testTrans = { zoom: 1, translateX: 0, translateY: 0 }

      const step = 0.1
      canvas.addEventListener('wheel', evt => {
        const prevZoom = testTrans.zoom

        if (evt.deltaY < 0) {
          console.log('放大')
          testTrans.zoom *= 1.1
        } else {
          testTrans.zoom *= 0.9
        }

        const p2 = {
          x: ((evt.offsetX - testTrans.translateX) / prevZoom) * (testTrans.zoom - prevZoom),
          y: ((evt.offsetY - testTrans.translateY) / prevZoom) * (testTrans.zoom - prevZoom)
        }

        testTrans.translateX -= p2.x
        testTrans.translateY -= p2.y
        draw()
      })

      draw()
      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height)

        ctx.save()

        ctx.translate(testTrans.translateX, testTrans.translateY)
        ctx.scale(testTrans.zoom, testTrans.zoom)

        ctx.fillRect(200, 200, 200, 100)

        ctx.restore()
      }
    </script>
  </body>
</html>
