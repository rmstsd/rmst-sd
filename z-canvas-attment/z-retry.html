<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>z-retry</title>

    <style></style>
  </head>

  <body>
    <canvas width="800" height="600" style="border: 1px solid red"></canvas>

    <script>
      const canvas = document.querySelector('canvas')
      const ctx = canvas.getContext('2d')

      const testTrans = { zoom: 1, translateX: 0, translateY: 0 }

      canvas.addEventListener('wheel', evt => {
        let scale
        if (evt.deltaY > 0) {
          scale = 0.9
        } else {
          scale = 1.1
        }

        testTrans.zoom *= scale

        const P1 = { x: evt.offsetX + testTrans.translateX, y: evt.offsetY + testTrans.translateY }
        console.log(P1)

        const P2 = { x: P1.x * (1 / scale), y: P1.y * (1 / scale) }

        P2.x = P2.x - P1.x
        P2.y = P2.y - P1.y

        testTrans.translateX += P2.x
        testTrans.translateY += P2.y

        draw()
      })

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height)

        ctx.save()

        ctx.translate(testTrans.translateX, testTrans.translateY)
        ctx.scale(testTrans.zoom, testTrans.zoom)

        ctx.fillRect(200, 200, 200, 100)

        ctx.restore()
      }
    </script>
  </body>
</html>
