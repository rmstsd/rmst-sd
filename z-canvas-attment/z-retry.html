<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>z-retry</title>

    <style></style>
  </head>

  <body>
    <canvas width="800" height="600" style="border: 1px solid red"></canvas>

    <script>
      const canvas = document.querySelector('canvas')
      const ctx = canvas.getContext('2d')

      const testTrans = { zoom: 1, translateX: 0, translateY: 0 }

      const step = 0.1
      canvas.addEventListener('wheel', evt => {
        const P1 = {
          x: ((evt.offsetX - testTrans.translateX) / testTrans.zoom) * step,
          y: ((evt.offsetY - testTrans.translateY) / testTrans.zoom) * step
        }

        if (evt.deltaY < 0) {
          console.log('dds')
          testTrans.zoom += step
          testTrans.translateX -= P1.x
          testTrans.translateY -= P1.y
        } else {
          testTrans.zoom -= step
          testTrans.translateX += P1.x
          testTrans.translateY += P1.y
        }

        draw()
      })

      draw()
      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height)

        ctx.save()

        ctx.translate(testTrans.translateX, testTrans.translateY)
        ctx.scale(testTrans.zoom, testTrans.zoom)

        ctx.fillRect(200, 200, 200, 100)

        ctx.restore()
      }
    </script>
  </body>
</html>
