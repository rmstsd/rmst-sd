<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>rf</title>

    <style></style>
  </head>

  <body>
    <button>111</button>
    <b>222</b>

    <script>
      document.addEventListener('click', () => {
        console.log('doc click')
      })

      document.querySelector('button').onclick = evt => {
        evt.stopPropagation()

        console.log('btn click')
      }

      document.querySelector('b').onclick = evt => {
        evt.stopPropagation()
        console.log('b click')
      }

      document.addEventListener('mouseup', evt => {
        console.log(evt.target)
      })

      //

      Array.prototype.qwer = 1
      const obj = {
        g: 8
      }

      Reflect.defineProperty(obj, 'a', {
        configurable: true,
        enumerable: true,
        get() {
          return 1
        },
        set() {}
      })
      Reflect.defineProperty(obj, 'b', { value: 'kkk', enumerable: false })

      const ks = Reflect.ownKeys(obj)
      console.log(ks)

      console.log(obj.a)

      const isSuccess = Reflect.set(obj, 'a', '555')
      console.log(isSuccess)

      console.log(obj)

      class User {
        constructor(a, b, c) {
          console.log(a, b, c)
          this.a = a
          this.b = b
          this.c = c
        }
      }

      const u = Reflect.construct(User, [1, 2, 3])
      console.log(u)

      const decs = Reflect.getOwnPropertyDescriptor(obj, 'g')
      console.log(decs)
    </script>
  </body>
</html>
