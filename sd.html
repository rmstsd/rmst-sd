<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>sd</title>

    <style>
      body {
        font-family: monospace;
        font-size: 16px;
      }

      div {
        display: inline-block;
      }
    </style>
  </head>

  <body>
    <div></div>

    <script>
      const chars = [
        'a',
        'b',
        'c',
        'd',
        'e',
        'f',
        'g',
        'h',
        'i',
        'j',
        'k',
        'l',
        'm',
        'n',
        'o',
        'p',
        'q',
        'r',
        's',
        't',
        'u',
        'v',
        'w',
        'x',
        'y',
        'z'
      ]

      function getRandomChar() {
        return chars[Math.floor(Math.random() * chars.length)]
      }

      const div = document.querySelector('div')

      div.onmouseenter = () => {
        execItem(0)
      }

      const text = 'rmstasdifgh'

      execItem(0)
      function execItem(index) {
        if (index > text.length - 1) {
          return
        }

        const charItem = text[index]

        const cSpan = div.children[index]

        const span = cSpan ?? document.createElement('span')
        span.textContent = charItem

        if (!div.children[index]) {
          div.appendChild(span)
        }

        animateChar(700, isEnd => {
          if (isEnd) {
            span.textContent = charItem
          } else {
            const char = getRandomChar()
            span.textContent = char
          }
        })

        setTimeout(() => {
          execItem(index + 1)
        }, 60)
      }

      function animateChar(duration, cb) {
        let start = performance.now()
        function rafCb() {
          const elapsed = performance.now() - start

          if (elapsed >= duration) {
            cb(true)
            return
          }
          cb(false)
          setTimeout(rafCb, 1000 / 20)
        }

        rafCb()
      }
    </script>
  </body>
</html>
