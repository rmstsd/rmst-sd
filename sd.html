<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>sd</title>

    <style></style>
  </head>

  <body>
    <div style="height: 200px; background: pink; margin-left: 500px; position: relative">
      0

      <mark style="display: block; width: 300px; height: 50px; position: absolute; left: -400px">1</mark>
    </div>

    <script>
      const outer = document.querySelector('div')
      const inner = document.querySelector('mark')

      outer.addEventListener('click', evt => {
        console.log(evt)
      })

      outer.addEventListener('mouseenter', evt => {
        console.log(evt)
        console.log('outer enter')
      })
      outer.addEventListener('mouseleave', () => {
        console.log('outer leave')
      })

      inner.addEventListener('mouseenter', () => {
        console.log('inner enter')
      })
      inner.addEventListener('mouseleave', () => {
        console.log('inner leave')
      })

      //
    </script>

    <hr />

    <div>
      <canvas width="800" height="400" style="border: 1px solid red; margin-left: 100px"></canvas>

      <script>
        const canvas = document.querySelector('canvas')
        const ctx = canvas.getContext('2d')

        const path = new Path2D()

        ctx.beginPath()

        const p_1 = { x: 100, y: 0 }
        path.moveTo(p_1.x, p_1.y)

        const p_2 = { x: 100 + Math.cos((Math.PI * 3) / 10) * 100, y: 100 + Math.sin((Math.PI * 3) / 10) * 100 }
        path.lineTo(p_2.x, p_2.y)

        const p_3 = { x: 100 - Math.cos((Math.PI * 1) / 10) * 100, y: 100 - Math.sin((Math.PI * 1) / 10) * 100 }
        path.lineTo(p_3.x, p_3.y)

        const p_4 = { x: 100 + Math.cos((Math.PI * 1) / 10) * 100, y: 100 - Math.sin((Math.PI * 1) / 10) * 100 }
        path.lineTo(p_4.x, p_4.y)

        const p_5 = { x: 100 - Math.cos((Math.PI * 3) / 10) * 100, y: 100 + Math.sin((Math.PI * 3) / 10) * 100 }
        path.lineTo(p_5.x, p_5.y)

        // const p_6 = { x: 100, y: 0 }
        // path.lineTo(p_6.x, p_6.y)

        ctx.lineWidth = 2

        ctx.fillStyle = 'pink'
        ctx.strokeStyle = 'rgba(0, 0, 255, 0.5)'

        ctx.fill(path, 'evenodd')
        ctx.stroke(path)

        // nonzero 非零环绕规则，默认的规则
        // evenodd 奇偶环绕规则

        canvas.addEventListener('mousemove', evt => {
          const is = ctx.isPointInPath(path, evt.offsetX, evt.offsetX)
          console.log(is)
        })

        const ps = [p_1, p_2, p_3, p_4, p_5]

        ps.forEach((item, index) => {
          ctx.beginPath()

          // const path = new Path2D()
          // path.arc(item.x, item.y, 5, 0, Math.PI * 2)

          ctx.fillStyle = 'red'

          ctx.fillText(index + 1, item.x + 10, item.y + 10)
        })

        //
      </script>
    </div>
  </body>
</html>
