  <body>
    <div style="height: 200px; background: pink; margin-left: 500px; position: relative">
      0

      <mark style="display: block; width: 300px; height: 50px; position: absolute; left: -400px">1</mark>
    </div>

    <script>
      const outer = document.querySelector('div')
      const inner = document.querySelector('mark')

      outer.addEventListener('click', evt => {
        console.log(evt)
      })

      outer.addEventListener('mouseenter', evt => {
        console.log(evt)
        console.log('outer enter')
      })
      outer.addEventListener('mouseleave', () => {
        console.log('outer leave')
      })

      inner.addEventListener('mouseenter', () => {
        console.log('inner enter')
      })
      inner.addEventListener('mouseleave', () => {
        console.log('inner leave')
      })

      //
    </script>
