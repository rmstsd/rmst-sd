<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>sd</title>

    <style>
      body {
        font-family: monospace;
        font-size: 16px;
      }

      div {
        display: inline-block;
      }
    </style>
  </head>

  <body>
    <script>
      const chars = [
        'a',
        'b',
        'c',
        'd',
        'e',
        'f',
        'g',
        'h',
        'i',
        'j',
        'k',
        'l',
        'm',
        'n',
        'o',
        'p',
        'q',
        'r',
        's',
        't',
        'u',
        'v',
        'w',
        'x',
        'y',
        'z'
      ]
      function getRandomChar() {
        return chars[Math.floor(Math.random() * chars.length)]
      }

      class Animator {
        constructor(duration = 1000) {
          this.duration = duration
        }

        duration = 1000

        start() {
          const start = performance.now()

          const frameCb = () => {
            const elapsed = Math.min(performance.now() - start, this.duration)

            if (elapsed === this.duration) {
              this.onDone?.()
            } else {
              this.onUpdate?.()

              setTimeout(frameCb, 1000 / 20)
            }
          }

          setTimeout(frameCb, 1000 / 20)
        }

        onDone() {}

        onUpdate() {}
      }

      class SingleWord {
        constructor(word) {
          this.word = word
        }

        root = document.createElement('div')

        word = ''
        totalTime = 200

        get interval() {
          return this.totalTime / this.word.length
        }

        startRender() {
          const dispatchItem = index => {
            if (index > this.word.length - 1) {
              return
            }

            this.renderCharItem(index)
            setTimeout(() => {
              dispatchItem(index + 1)
            }, this.interval)
          }

          dispatchItem(0)
        }

        renderCharItem(index) {
          console.log(index)
          const charItem = this.word.charAt(index)
          const animator = new Animator(200)

          const span = document.createElement('span')
          this.root.append(span)

          animator.onUpdate = () => {
            const char = getRandomChar()
            span.textContent = char
          }
          animator.onDone = () => {
            span.textContent = charItem
          }
          animator.start()
        }
      }

      const text = 'rmstasdifghasdasdasd'
      const word = new SingleWord(text)

      document.body.append(word.root)

      console.log(word)

      word.startRender()
    </script>
  </body>
</html>
