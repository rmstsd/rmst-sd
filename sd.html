  <body>
    <script src="https://cdn.jsdelivr.net/npm/lodash@4.17.21/lodash.min.js"></script>

    <script>
      ;(() => {
        const b = { c: 1 }
        b.a = b

        const ans = deepClone(b)
        // ans.a.c = 2

        console.log(ans)
        console.log(b)

        console.log(ans.a === b.a)

        // const llans = _.cloneDeep(b)
        // console.log(llans.a === b.a)

        function deepClone(obj) {
          const map = new Map()

          return clone(obj)

          function clone(value) {
            if (typeof value !== 'object' && value !== null) {
              return value
            }

            if (map.has(value)) {
              return map.get(value)
            }

            const newValue = Array.isArray(value) ? [] : {}

            map.set(value, newValue)

            for (const key in value) {
              newValue[key] = clone(value[key])
            }

            return newValue
          }
        }
      })()

      //
    </script>
