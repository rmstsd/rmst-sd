<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>sd</title>

    <style>
      .div {
        position: fixed;
        width: 100px;
        height: 100px;
      }
    </style>
  </head>

  <body>
    <div class="div" style="left: 0; top: 0"></div>

    <script>
      const div = document.querySelector('div')

      const parameter = new URLSearchParams(location.search)
      const isTop = parameter.has('top')

      div.style.left = -window.screenLeft + 'px'

      div.style.top = -(window.screenTop - (isTop ? 0 : window.outerHeight - window.innerHeight)) + 'px'

      div.style.backgroundColor = randomColor()

      function randomColor() {
        return 'red'

        const r = Math.floor(Math.random() * 255)
        const g = Math.floor(Math.random() * 255)
        const b = Math.floor(Math.random() * 255)

        return `rgb(${r}, ${g}, ${b})`
      }

      const bc = new BroadcastChannel('internal_notification')

      bc.addEventListener('message', evt => {
        setCoordOffset(evt.data)

        // setCoordPos(-window.screenLeft + evt.data.dx, 0)
      })

      let down = false
      let prevX = 0
      let prevY = 0
      div.onmousedown = evt => {
        prevX = evt.clientX
        prevY = evt.clientY
        down = true
      }

      document.onmousemove = evt => {
        if (!down) {
          return
        }

        const dx = evt.clientX - prevX
        const dy = evt.clientY - prevY

        setCoordOffset({ dx, dy })

        bc.postMessage({ dx, dy })

        prevX = evt.clientX
        prevY = evt.clientY
      }

      document.onmouseup = () => {
        down = false
      }

      function setCoordOffset({ dx, dy }) {
        div.style.left = parseFloat(div.style.left) + dx + 'px'
        div.style.top = parseFloat(div.style.top) + dy + 'px'
      }

      function setCoordPos(left, top) {
        div.style.left = left + 'px'
        div.style.top = top + 'px'
      }

      requestAnimationFrame(function exec() {})

      //
    </script>
  </body>
</html>
