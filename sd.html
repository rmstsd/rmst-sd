    <script>
      const cssWidth = 500
      const cssHeight = 500

      const dpr = window.devicePixelRatio

      console.log('dpr', dpr)

      const canvas = document.querySelector('canvas')
      const ctx = canvas.getContext('2d')

      canvas.width = cssWidth * dpr
      canvas.height = cssHeight * dpr

      canvas.style.width = cssWidth + 'px'
      canvas.style.height = cssHeight + 'px'

      ctx.scale(dpr, dpr)

      ctx.fillRect(100, 100, 100, 100)

      ctx.arc(400, 200, 40, 0, Math.PI * 2)
      ctx.fillStyle = 'orange'
      ctx.strokeStyle = 'red'
      ctx.lineWidth = 10
      ctx.stroke()
      ctx.fill()

      ctx.font = '24px 微软雅黑'
      ctx.fillStyle = 'purple'
      ctx.fillText('hello', 50, 50)

      ctx.moveTo(10, 10)
      ctx.lineTo(20, 10)

      ctx.lineWidth = 1
      ctx.strokeStyle = 'red'
      ctx.stroke()

      function getDis(element, direction) {
        return element.getBoundingClientRect()[direction]
      }
      function curry(originFunc) {
        const curried = (...args) => {
          if (args.length < originFunc.length) {
            return (...others) => curried(...args, ...others)
          }
          return originFunc(...args)
        }

        return curried
      }

      console.log(getDis(canvas, 'top'))
      console.log(getDis(canvas, 'left'))
      console.log(getDis(canvas, 'right'))

      console.log('-------------------')

      const getCanvasDis = curry(getDis)(canvas)

      console.log(getCanvasDis('top'))
      console.log(getCanvasDis('left'))
      console.log(getCanvasDis('right'))
    </script>

    <script>
      console.log('-----------------------------')

      const shape = {
        x: 10,
        y: 10,
        width: 100,
        height: 100,
        color: 'red'
      }

      function createOverload() {
        const callMap = new Map()

        function overload(...args) {
          const fn = callMap.get(args.length)

          if (fn) {
            fn.apply(this, args)
          }
        }

        overload.addImpl = function (fn) {
          if (typeof fn !== 'function') {
            return
          }
          callMap.set(fn.length, fn)
        }

        return overload
      }

      const updateShape = createOverload()

      updateShape.addImpl(obj => {
        Object.assign(shape, obj)
      })
      updateShape.addImpl((attr, value) => {
        Object.assign(shape, { [attr]: value })
      })

      console.log(shape)
