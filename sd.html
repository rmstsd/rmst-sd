<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>sd</title>

    <style></style>
  </head>

  <body>
    <script>
      const list = Array.from({ length: 20 }, (_, index) => {
        return () => {
          return fetch('http://localhost:1250' + '?time=' + Math.ceil(Math.random() * 10)).then(() => index)
        }
      })

      console.log(list)

      asyncPool(2, list).then(ans => {
        console.log(ans)
      })

      async function asyncPool(limit, list) {
        const ret = []
        const requestIng = []

        for (const iteratorFunc of list) {
          const itemPromise = iteratorFunc()
          ret.push(itemPromise)

          if (limit < list.length) {
            requestIng.push(itemPromise)
            itemPromise.then(() => {
              requestIng.splice(requestIng.indexOf(itemPromise), 1)
            })

            if (requestIng.length >= limit) {
              await Promise.race(requestIng)
            }
          }
        }

        return Promise.all(ret)
      }
    </script>
  </body>
</html>
