<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>draggable</title>

    <style>
      .rect {
        width: 100px;
        height: 100px;
        user-select: none;
      }

      .snapshoot {
        position: absolute;
        display: none;

        width: 50px;
        height: 50px;
        background: aqua;
        pointer-events: none;
      }
    </style>
  </head>

  <body>
    <div id="p" class="rect" style="background-color: pink">pp</div>

    <div id="draggable" draggable="true" style="width: 20px; height: 20px; background-color: firebrick">1</div>

    <div id="droppable" class="rect" draggable="true" style="background-color: purple"></div>

    <div class="snapshoot"></div>

    <script>
      const p = document.querySelector('#p')
      let dragDom = document.querySelector('#draggable')
      dragDom.addEventListener('dragstart', e => {
        // e.dataTransfer.setDragImage(p, 0, 0)
        // e.dataTransfer.setDragImage(new Image(), 0, 0)
      })

      const snapshoot = document.querySelector('.snapshoot')

      dragDom.addEventListener('drag', e => {
        console.log('drag')
        snapshoot.style.display = 'block'
        snapshoot.style.left = e.clientX + 'px'
        snapshoot.style.top = e.clientY + 'px'
      })

      dragDom.addEventListener('dragend', e => {
        snapshoot.style.display = 'none'
      })

      const dropDom = document.querySelector('#droppable')
      dropDom.addEventListener('dragover', e => {
        e.preventDefault()

        e.dataTransfer.dropEffect = 'copy' // none || move || copy || link
      })
    </script>
  </body>
</html>
