<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>sd</title>

    <style></style>
  </head>

  <body>
    <div style="height: 100px"></div>

    <canvas width="800" height="400" style="border: 1px solid red; display: block; margin: auto"></canvas>

    <script>
      const div = document.querySelector('div')

      const canvas = document.querySelector('canvas')
      const ctx = canvas.getContext('2d')

      function j2h(r) {
        return (r * Math.PI) / 180
      }

      ;(() => {
        const rectOpt = { x: 100, y: 100, width: 100, height: 100, rotate: 30, scale: [1.5, 1] }

        const rectCenter = { x: rectOpt.x + rectOpt.width / 2, y: rectOpt.y + rectOpt.height / 2 }

        let path
        let isDown = false

        function isInner(x, y) {
          ctx.save()

          ctx.translate(rectOpt.x, rectOpt.y)
          ctx.scale(1.5, 1.5)
          // ctx.rotate(j2h(45))
          ctx.translate(-rectOpt.x, -rectOpt.y)

          ctx.lineWidth = 10

          const inner = ctx.isPointInPath(path, x, y)
          ctx.restore()

          return inner
        }

        canvas.addEventListener('mousedown', evt => {
          const x = evt.offsetX
          const y = evt.offsetY

          const inner = isInner(x, y)

          if (inner) {
            isDown = true
            div.textContent = 'true'
          } else {
            div.textContent = 'false'
          }
        })

        document.addEventListener('mouseup', () => {
          isDown = false
        })

        canvas.addEventListener('mousemove', evt => {
          if (isInner(evt.offsetX, evt.offsetY)) {
            ctx.strokeStyle = 'blue'
            ctx.lineWidth = 2
            draw()
          } else {
            ctx.strokeStyle = 'black'
            ctx.lineWidth = 1
            draw()
          }

          if (!isDown) {
            return
          }

          rectOpt.x += evt.movementX
          rectOpt.y += evt.movementY
          rectCenter.x = rectOpt.x + rectOpt.width / 2
          rectCenter.y = rectOpt.y + rectOpt.height / 2

          draw()
        })

        draw()
        draw()

        function draw() {
          ctx.clearRect(-1000, -1000, 200000, 2000000)

          ctx.strokeRect(rectOpt.x, rectOpt.y, rectOpt.width, rectOpt.height)

          ctx.save()

          ctx.translate(rectOpt.x, rectOpt.y)
          ctx.scale(1.5, 1.5)
          // ctx.rotate(j2h(45))
          ctx.translate(-rectOpt.x, -rectOpt.y)

          ctx.beginPath()

          path = new Path2D()
          path.rect(rectOpt.x, rectOpt.y, rectOpt.width, rectOpt.height)

          ctx.fillStyle = 'pink'
          ctx.fill(path)
          ctx.stroke(path)

          ctx.restore()

          ctx.fillRect(rectOpt.x, rectOpt.y, 4, 4)
        }
      })()
      //
    </script>
  </body>
</html>
