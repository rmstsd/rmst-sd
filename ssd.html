<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ssd</title>

    <style></style>
  </head>

  <body>
    <canvas id="myCanvas"></canvas>

    <script>
      const canvas = document.getElementById('myCanvas')
      const ctx = canvas.getContext('2d')

      const rectX = 50
      const rectY = 50
      const rectWidth = 200
      const rectHeight = 100

      const text = 'Dynamic Text that needs to be wrapped if it exceeds the width of the rectangle.'
      const fontSize = 16
      const fontFamily = 'Arial'
      ctx.font = `${fontSize}px ${fontFamily}`
      ctx.textAlign = 'left'
      ctx.textBaseline = 'top'

      const words = text.split(' ')
      let line = ''
      const lines = []

      for (let i = 0; i < words.length; i++) {
        const testLine = line + words[i] + ' '
        const metrics = ctx.measureText(testLine)
        const testWidth = metrics.width

        if (testWidth > rectWidth && i > 0) {
          lines.push(line)
          line = words[i] + ' '
        } else {
          line = testLine
        }
      }

      lines.push(line)

      const lineHeight = fontSize + 4 // 行高
      const maxLines = Math.floor(rectHeight / lineHeight) // 最大行数
      const displayLines = lines.slice(0, maxLines) // 需要显示的行数

      ctx.fillStyle = 'red'
      ctx.fillRect(rectX, rectY, rectWidth, rectHeight)
      for (let j = 0; j < displayLines.length; j++) {
        const lineText = displayLines[j]
        const textX = rectX
        const textY = rectY + j * lineHeight

        ctx.fillStyle = 'white'

        ctx.fillText(lineText, textX, textY, rectWidth)
      }
    </script>

    <script>
      class User {
        constructor() {}

        [Symbol.toStringTag] = 'User'

        static [Symbol.hasInstance]() {
          console.log('hasInstance')
          return ''
        }
      }

      const u = new User()

      // console.log(u.constructor === User)

      // console.log(Object.prototype.toString.call(u))

      // console.log(u instanceof User)

      const raw = {
        name: 'a'
      }

      const pro = new Proxy(raw, {
        get(target, key) {
          console.log('get')
          return target[key]
        },
        set(target, key, value) {
          console.log('set')
          target[key] = value
        }
      })

      console.log(pro)

      pro.name = 'b'

      console.log(pro)

      console.log(raw)
    </script>
  </body>
</html>
