<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ssd</title>

    <style></style>
  </head>

  <body>
    <script>
      class User {
        constructor() {}

        [Symbol.toStringTag] = 'User'

        static [Symbol.hasInstance]() {
          console.log('hasInstance')
          return ''
        }
      }

      const u = new User()

      // console.log(u.constructor === User)

      // console.log(Object.prototype.toString.call(u))

      // console.log(u instanceof User)

      const raw = {
        name: 'a'
      }

      const pro = new Proxy(raw, {
        get(target, key) {
          console.log('get')
          return target[key]
        },
        set(target, key, value) {
          console.log('set')
          target[key] = value
        }
      })

      console.log(pro)

      pro.name = 'b'

      console.log(pro)

      console.log(raw)
    </script>
  </body>
</html>
